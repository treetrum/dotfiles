# Resize with prefix + H/J/K/L (vim-style)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# enable mouse scrolling
set -g mouse on

# vim style copy mode
set -g mode-keys vi

# Copy to macOS clipboard
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# More sane window numbering
set -g base-index 1 # start at 1
set -g renumber-windows on # renumber automatically

# Open new windows/panes in the same directory as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Status bar styling
set -g status-position bottom
set -g status-style bg=default,fg=white
set -g status-left " #[fg=black,bg=blue,bold] #S #[default] "
set -g status-right " #[fg=white,bg=brightblack] %H:%M #[default] #[fg=black,bg=cyan] %d-%b-%y #[default] "
set -g window-status-format "#[fg=white,bg=brightblack] #I #[fg=white,bg=brightblack]#W #[default]"
set -g window-status-separator " "
set -g window-status-current-format "#[fg=black,bg=green,bold] #I #[fg=black,bg=green,bold]#W #[default]"
