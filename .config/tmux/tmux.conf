# Navigate panes with prefix + h/j/k/l (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize with prefix + H/J/K/L (vim-style)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config with prefix + r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display-message "Config reloaded!"

# enable mouse scrolling
set -g mouse on

# vim style copy mode
set -g mode-keys vi

# Copy to macOS clipboard
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# More sane window numbering
set -g base-index 1 # start at 1
set -g renumber-windows on # renumber automatically

# Navigate to windows with Option + number (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Clear screen and scrollback with Option + k
bind -n M-k send-keys C-l \; clear-history

# Open new windows/panes in the same directory as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane border styling - make active pane more visible
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=green,bold

# Status bar styling
set -g status-position top
set -g status-style bg=default,fg=white
set -g status-left-length 50
set -g status-left " #{?window_zoomed_flag, #[fg=black bg=yellow bold] ZOOM #[default],} "
set -g status-right "#[fg=brightblack]#[fg=white,bg=brightblack] #(top -l 1 | grep 'CPU usage' | awk '{print $3}')#[fg=brightblack,bg=default]#[default] #{?client_prefix,#[fg=magenta],#[fg=blue]}#{?client_prefix,#[fg=black bg=magenta bold],#[fg=black bg=blue bold]} #S#[default]#{?client_prefix,#[fg=magenta],#[fg=blue]}"
set -g window-status-format "#[fg=brightblack]#[fg=brightwhite,bg=brightblack]#I #[fg=white,bg=brightblack]#W#[fg=brightblack,bg=default]"
set -g window-status-separator " "
set -g window-status-current-format "#[fg=green]#[fg=black,bg=green,bold]#I #[fg=black,bg=green,bold]#W#[fg=green,bg=default]#[default]"

# Better mouse scrolling
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
